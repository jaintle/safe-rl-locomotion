name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Smoke & determinism tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for MuJoCo
        # libgl1-mesa-glx was removed in Ubuntu 24.04; libgl1 is the replacement.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglu1-mesa \
            libglfw3 \
            libosmesa6 \
            patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package in editable mode
        run: pip install -e . --no-build-isolation

      - name: Verify environment (smoke_env.py)
        # Confirms Gymnasium + MuJoCo installation is healthy before running tests.
        run: python scripts/smoke_env.py

      - name: Run fast test suite
        # Runs smoke tests (5k-step PPO and C-PPO training) and determinism
        # checks. Excludes slow tests (50k-step learning regression) which are
        # too expensive for CI. Run locally with: pytest -m slow
        run: pytest -q

      # Slow tests (learning regression, ~10–20 min) are intentionally
      # excluded from CI. They can be triggered manually:
      #   pytest -q -m slow
      # Uncomment the block below if a GPU runner is available.
      #
      # - name: Run slow tests (learning regression)
      #   run: pytest -q -m slow
