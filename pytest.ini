[pytest]
# Register custom markers so pytest doesn't emit PytestUnknownMarkWarning.
markers =
    slow: marks tests as slow (run explicitly with '-m slow')

# Exclude slow tests from the default 'pytest -q' run.
# The last -m flag on the command line overrides this (argparse store action),
# so 'pytest -m slow' correctly selects only the slow tests.
addopts = -m "not slow"
